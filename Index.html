<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日期時間提醒</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      width: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: 'Noto Serif TC', 'PingFang TC', serif;
      background: #fff;
    }

    /* ══ PAGE SCROLL WRAPPER ══ */
    .page {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    /* ══ CLOCK BLOCK — fills viewport height ══ */
    .clock-block {
      width: 100%;
      height: 100vh;       /* full viewport — scrolling reveals content below */
      min-height: 300px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .clock-row {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .clock-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* Date panel */
    .date-panel {
      flex: 50;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; gap: 1.2vh; overflow: hidden;
    }
    .date-display { font-weight: 900; color: #fff; letter-spacing: 0.04em; line-height: 1; white-space: nowrap; font-size: 40px; }
    .date-weekday { font-weight: 700; color: #FFD700; letter-spacing: 0.15em; line-height: 1; font-size: 26px; }

    /* Splitter */
    .splitter {
      height: 44px; background: #FFD700;
      flex-shrink: 0; display: flex; align-items: center;
      z-index: 20; user-select: none;
    }
    .splitter.dragging { background: #fff200; }
    .splitter-btns { display: flex; align-items: center; gap: 6px; padding: 0 8px; flex-shrink: 0; cursor: default; }
    .sp-btn {
      width: 34px; height: 34px; border-radius: 8px;
      border: 2px solid #000; background: #000; color: #FFD700;
      font-family: inherit; font-weight: 900; font-size: 0.85rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .sp-btn:active { transform: scale(0.88); }
    .sp-btn.active { background: #CC0000; border-color: #CC0000; color: #fff; }
    .sp-btn.warn   { background: #FF6600; border-color: #FF6600; color: #fff; animation: pulse 1.2s ease infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,102,0,.5)} 50%{box-shadow:0 0 0 6px rgba(255,102,0,0)} }
    .splitter-drag {
      flex: 1; height: 100%; cursor: ns-resize;
      display: flex; align-items: center; justify-content: center;
    }
    .splitter-drag::after { content:'⠿⠿⠿'; color:rgba(0,0,0,.35); font-size:13px; letter-spacing:3px; pointer-events:none; }

    /* Time panel */
    .time-panel {
      flex: 50; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #fff; gap: 0.8vh; overflow: hidden;
    }
    .period-label { font-weight: 700; color: #000; letter-spacing: 0.2em; line-height: 1; font-size: 30px; }
    .time-display { font-weight: 900; color: #000; letter-spacing: -0.02em; line-height: 1; font-size: 90px; font-variant-numeric: tabular-nums; }
    .time-colon   { display: inline-block; animation: blink 1s step-start infinite; color: #CC0000; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Right slider */
    .slider-col {
      width: 52px; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #111; flex-shrink: 0; gap: 8px; padding: 12px 0;
    }
    .slider-label {
      color: #FFD700; font-size: 0.65rem; font-weight: 700;
      writing-mode: vertical-rl; opacity: 0.7; flex-shrink: 0;
    }
    #split-slider {
      -webkit-appearance: slider-vertical; appearance: slider-vertical;
      writing-mode: vertical-lr; direction: rtl;
      width: 28px; flex: 1; cursor: pointer; accent-color: #FFD700;
    }

    /* ══ FREE TEXT STRIP ══ */
    .free-text-row {
      width: 100%; background: #f4f4f4;
      border-top: 3px solid #FFD700;
      display: flex; align-items: stretch;
      min-height: 80px;
      flex-shrink: 0;
    }
    .note-wrap {
      flex: 1; display: flex; align-items: center;
      padding: 10px 16px; overflow: hidden; min-width: 0;
    }
    #note-area {
      width: 100%; outline: none; border: none; background: transparent;
      font-family: inherit; font-weight: 700; color: #000;
      line-height: 1.3; overflow: hidden;
      word-break: break-all; white-space: pre-wrap; caret-color: #CC0000;
      font-size: 28px;
    }
    #note-area:empty::before { content: attr(data-placeholder); color: #bbb; font-weight: 400; }
    .free-text-btns {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px; padding: 8px 12px; flex-shrink: 0;
    }
    .ctrl-btn {
      width: 54px; height: 54px; border-radius: 50%;
      border: 3px solid #FFD700;
      font-family: inherit; font-weight: 900; font-size: 1.5rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,.2);
    }
    .ctrl-btn:active { transform: scale(0.88); }
    .btn-bigger  { background: #000; color: #FFD700; }
    .btn-smaller { background: #FFD700; color: #000; }
    .ctrl-btn:disabled { opacity: 0.25; box-shadow: none; }

    /* ══ REMINDERS SECTION ══ */
    .reminders-section {
      width: 100%;
      background: #fff;
      border-top: 3px solid #FFD700;
    }

    .reminders-header {
      display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
      background: #000; color: #FFD700;
      padding: 14px 16px;
      position: sticky; top: 0; z-index: 10;
    }
    .reminders-title { flex: 1; font-size: 1.8rem; font-weight: 900; letter-spacing: 0.08em; min-width: 120px; }

    /* Reminder font-size controls */
    .rem-font-ctrl {
      display: flex; align-items: center; gap: 8px;
    }
    .rem-font-label { font-size: 1rem; color: #FFD700; opacity: 0.8; white-space: nowrap; }
    .rem-ctrl-btn {
      width: 46px; height: 46px; border-radius: 50%;
      border: 2px solid #FFD700;
      font-family: inherit; font-weight: 900; font-size: 1.3rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .rem-ctrl-btn:active { transform: scale(0.88); }
    .rem-btn-big   { background: #FFD700; color: #000; }
    .rem-btn-small { background: #000;    color: #FFD700; }
    .rem-ctrl-btn:disabled { opacity: 0.3; }
    .rem-font-val  { font-size: 1.1rem; font-weight: 900; color: #FFD700; min-width: 36px; text-align: center; }

    .add-btn {
      background: #FFD700; color: #000; border: none; border-radius: 10px;
      padding: 12px 24px; font-family: inherit; font-weight: 900; font-size: 1.5rem;
      cursor: pointer; white-space: nowrap;
    }
    .add-btn:active { transform: scale(0.92); }

    /* Reminder list — normal flow, not scrollable container */
    .reminders-list {
      padding: 14px 14px 40px;
      display: flex; flex-direction: column; gap: 14px;
    }

    /* ── Card ── */
    .reminder-card {
      border-radius: 14px; border: 3px solid #ddd;
      padding: 14px 16px; background: #fafafa;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .reminder-card.pinned { border-color: #FFD700; background: #fffbe6; }

    .pin-col {
      display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .icon-btn {
      width: 52px; height: 52px; border-radius: 50%;
      border: 2px solid #ccc; background: #fff; color: #555;
      font-size: 1.4rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:active { transform: scale(0.88); }
    .icon-btn.pin-on  { background: #FFD700; border-color: #FFD700; color: #000; }
    .icon-btn.del-btn { border-color: #ffaaaa; color: #CC0000; }
    .icon-btn.edit-btn{ border-color: #aad4ff; color: #0055aa; }

    .card-body { flex: 1; min-width: 0; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 6px 16px; margin-bottom: 8px; }
    .meta-pill { display: flex; align-items: center; gap: 4px; color: #555; font-weight: 700; }
    .card-content { font-weight: 900; color: #000; line-height: 1.35; word-break: break-all; }

    .badge {
      display: inline-block; border-radius: 6px;
      padding: 2px 9px; font-size: 0.85rem; font-weight: 700; margin-right: 4px;
    }
    .badge-pin    { background: #FF6600; color: #fff; display: none; }
    .badge-repeat { background: #0055aa; color: #fff; }
    .reminder-card.pinned .badge-pin { display: inline-block; }

    .empty-state { text-align: center; color: #bbb; font-size: 1.6rem; padding: 40px 0; font-weight: 400; }

    /* ══ MODAL ══ */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 300;
      display: flex; align-items: flex-end;
    }
    .modal-backdrop.hidden { display: none; }
    .modal {
      width: 100%; max-height: 92vh;
      background: #fff; border-radius: 20px 20px 0 0;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-header {
      background: #000; color: #FFD700;
      padding: 18px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .modal-title  { flex: 1; font-size: 1.8rem; font-weight: 900; }
    .modal-close  {
      width: 50px; height: 50px; border-radius: 50%;
      border: 2px solid #FFD700; background: transparent; color: #FFD700;
      font-size: 1.8rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-body   { flex: 1; overflow-y: auto; padding: 20px 20px 0; display: flex; flex-direction: column; gap: 16px; }
    .field-group  { display: flex; flex-direction: column; gap: 8px; }
    .field-label  { font-size: 1.3rem; font-weight: 700; color: #555; display: flex; align-items: center; gap: 6px; }
    .field-input  {
      font-family: inherit; font-weight: 700; font-size: 1.6rem;
      border: 3px solid #ddd; border-radius: 12px;
      padding: 12px 16px; width: 100%; outline: none; color: #000;
    }
    .field-input:focus { border-color: #FFD700; }
    .repeat-row   { display: flex; gap: 10px; flex-wrap: wrap; }
    .repeat-opt   {
      flex: 1; min-width: 80px; padding: 12px 6px;
      border-radius: 10px; border: 3px solid #ddd;
      font-family: inherit; font-weight: 700; font-size: 1.2rem;
      cursor: pointer; text-align: center; background: #fff;
    }
    .repeat-opt.sel { background: #FFD700; border-color: #FFD700; color: #000; }
    .modal-footer { padding: 16px 20px 24px; display: flex; gap: 12px; flex-shrink: 0; }
    .modal-save   {
      flex: 2; padding: 16px; border-radius: 14px; border: none;
      background: #000; color: #FFD700;
      font-family: inherit; font-weight: 900; font-size: 1.6rem; cursor: pointer;
    }
    .modal-cancel {
      flex: 1; padding: 16px; border-radius: 14px; border: 3px solid #ddd;
      background: #fff; color: #555;
      font-family: inherit; font-weight: 700; font-size: 1.4rem; cursor: pointer;
    }

    /* scroll-hint arrow at bottom of clock block */
    .scroll-hint {
      text-align: center; padding: 6px 0;
      font-size: 1.4rem; color: #FFD700; background: #000;
      letter-spacing: 0.15em; flex-shrink: 0;
      animation: bounceDown 1.6s ease infinite;
      cursor: default; user-select: none;
    }
    @keyframes bounceDown {
      0%,100%{ transform: translateY(0); } 50%{ transform: translateY(5px); }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- ══ CLOCK BLOCK (full viewport height) ══ -->
  <div class="clock-block" id="clock-block">
    <div class="clock-row" id="clock-row">
      <div class="clock-area" id="clock-area">
        <div class="date-panel" id="date-panel">
          <div class="date-display"  id="date-display"></div>
          <div class="date-weekday"  id="weekday-display"></div>
        </div>
        <div class="splitter" id="splitter">
          <div class="splitter-btns">
            <button class="sp-btn" id="btn-autofit" title="自動適配字體">⊡</button>
          </div>
          <div class="splitter-drag" id="splitter-drag"></div>
        </div>
        <div class="time-panel" id="time-panel">
          <div class="period-label" id="period-display"></div>
          <div class="time-display"  id="time-display"></div>
        </div>
      </div>
      <div class="slider-col">
        <span class="slider-label">日期</span>
        <input type="range" id="split-slider" min="15" max="85" value="50" step="1" />
        <span class="slider-label">時間</span>
      </div>
    </div>
    <!-- Scroll hint -->
    <div class="scroll-hint">↓ 向下滾動查看備注及提醒 ↓</div>
  </div>

  <!-- ══ FREE TEXT STRIP ══ -->
  <div class="free-text-row" id="free-text-row">
    <div class="note-wrap">
      <div id="note-area" contenteditable="true" spellcheck="false"
           data-placeholder="輸入備注文字…"></div>
    </div>
    <div class="free-text-btns">
      <button class="ctrl-btn btn-bigger"  id="btn-up">大</button>
      <button class="ctrl-btn btn-smaller" id="btn-down">小</button>
    </div>
  </div>

  <!-- ══ REMINDERS ══ -->
  <div class="reminders-section">
    <div class="reminders-header">
      <span class="reminders-title">📋 提醒事項</span>
      <div class="rem-font-ctrl">
        <span class="rem-font-label">字體</span>
        <button class="rem-ctrl-btn rem-btn-small" id="rem-dn" aria-label="縮小">小</button>
        <span class="rem-font-val" id="rem-font-val">24</span>
        <button class="rem-ctrl-btn rem-btn-big"   id="rem-up" aria-label="放大">大</button>
      </div>
      <button class="add-btn" id="add-reminder-btn">＋ 新增</button>
    </div>
    <div class="reminders-list" id="reminders-list"></div>
  </div>

</div><!-- .page -->

<!-- ══ MODAL ══ -->
<div class="modal-backdrop hidden" id="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">新增提醒</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">📅 日期</label>
        <input class="field-input" type="date" id="f-date" />
      </div>
      <div class="field-group">
        <label class="field-label">⏰ 時間</label>
        <input class="field-input" type="time" id="f-time" />
      </div>
      <div class="field-group">
        <label class="field-label">📍 地點</label>
        <input class="field-input" type="text" id="f-loc" placeholder="例：診所、家中、藥房…" />
      </div>
      <div class="field-group">
        <label class="field-label">📝 內容</label>
        <input class="field-input" type="text" id="f-content" placeholder="例：食藥、覆診、生日會…" />
      </div>
      <div class="field-group">
        <label class="field-label">🔁 重複</label>
        <div class="repeat-row" id="repeat-row">
          <button class="repeat-opt sel" data-val="none">不重複</button>
          <button class="repeat-opt"     data-val="daily">每日</button>
          <button class="repeat-opt"     data-val="weekly">每週</button>
          <button class="repeat-opt"     data-val="monthly">每月</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel" id="modal-cancel">取消</button>
      <button class="modal-save"   id="modal-save">儲存</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════
   CLOCK
══════════════════════════════════ */
const WEEKDAYS=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
function pad(n){return String(n).padStart(2,'0');}
function getPeriod(h){return h<12?'早上':h<18?'下午':'晚上';}

function tick(){
  const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Hong_Kong'}));
  const y=now.getFullYear(),m=now.getMonth()+1,d=now.getDate();
  const h=now.getHours(),min=now.getMinutes();
  document.getElementById('date-display').textContent    =`${y}年${m}月${d}日`;
  document.getElementById('weekday-display').textContent =WEEKDAYS[now.getDay()];
  document.getElementById('period-display').textContent  =getPeriod(h);
  document.getElementById('time-display').innerHTML      =
    `${pad(h)}<span class="time-colon">:</span>${pad(min)}`;
}
tick(); setInterval(tick,1000);

/* ══════════════════════════════════
   CLOCK FONT SIZING
══════════════════════════════════ */
const SCALES=[0.5,0.65,0.8,1,1.2,1.45,1.75];
let scaleIdx=3;
const datePanelEl=document.getElementById('date-panel');
const timePanelEl=document.getElementById('time-panel');
const btnAutofit =document.getElementById('btn-autofit');

function calcFontSizes(){
  const dateH=datePanelEl.clientHeight, timeH=timePanelEl.clientHeight;
  const vw=window.innerWidth-52, s=SCALES[scaleIdx];
  document.getElementById('date-display').style.fontSize    =Math.max(12,Math.floor(Math.min(vw*.115,dateH*.40)*s))+'px';
  document.getElementById('weekday-display').style.fontSize =Math.max(10,Math.floor(Math.min(vw*.075,dateH*.26)*s))+'px';
  document.getElementById('period-display').style.fontSize  =Math.max(10,Math.floor(Math.min(vw*.085,timeH*.28)*s))+'px';
  document.getElementById('time-display').style.fontSize    =Math.max(12,Math.floor(Math.min(vw*.23, timeH*.58)*s))+'px';
  checkOverflow();
}

function checkOverflow(){
  const ov=document.getElementById('date-display').scrollWidth>datePanelEl.clientWidth+4
          ||datePanelEl.scrollHeight>datePanelEl.clientHeight+4
          ||document.getElementById('time-display').scrollWidth>timePanelEl.clientWidth+4;
  btnAutofit.classList.toggle('warn',ov);
}

btnAutofit.addEventListener('click',()=>{
  for(let i=SCALES.length-1;i>=0;i--){
    scaleIdx=i; calcFontSizes();
    const noOv=document.getElementById('date-display').scrollWidth<=datePanelEl.clientWidth+4
              &&datePanelEl.scrollHeight<=datePanelEl.clientHeight+4
              &&document.getElementById('time-display').scrollWidth<=timePanelEl.clientWidth+4;
    if(noOv)break;
  }
  btnAutofit.classList.remove('warn');
});

/* ══════════════════════════════════
   SPLIT RATIO
══════════════════════════════════ */
let splitVal=50;
const sliderEl=document.getElementById('split-slider');

function applySplit(v){
  splitVal=Math.max(15,Math.min(85,v));
  datePanelEl.style.flex=splitVal;
  timePanelEl.style.flex=100-splitVal;
  sliderEl.value=splitVal;
  requestAnimationFrame(calcFontSizes);
}
sliderEl.addEventListener('input',e=>applySplit(Number(e.target.value)));

// Drag splitter
const splitterDrag=document.getElementById('splitter-drag');
const clockAreaEl =document.getElementById('clock-area');
let dragging=false,dStartY=0,dStartSplit=50;
function dStart(e){dragging=true;dStartY=e.touches?e.touches[0].clientY:e.clientY;dStartSplit=splitVal;document.getElementById('splitter').classList.add('dragging');e.preventDefault();}
function dMove(e){if(!dragging)return;const cy=e.touches?e.touches[0].clientY:e.clientY;applySplit(dStartSplit+((cy-dStartY)/clockAreaEl.clientHeight)*100);e.preventDefault();}
function dEnd(){if(!dragging)return;dragging=false;document.getElementById('splitter').classList.remove('dragging');}
splitterDrag.addEventListener('mousedown',dStart);
splitterDrag.addEventListener('touchstart',dStart,{passive:false});
window.addEventListener('mousemove',dMove);
window.addEventListener('touchmove',dMove,{passive:false});
window.addEventListener('mouseup',dEnd);
window.addEventListener('touchend',dEnd);

/* ══════════════════════════════════
   FREE TEXT — font controls
══════════════════════════════════ */
const NOTE_SIZES=[18,22,26,30,36,44,54];
let noteIdx=2; // default 26px
const noteEl=document.getElementById('note-area');

function applyNoteFont(){
  const fs=NOTE_SIZES[noteIdx];
  noteEl.style.fontSize=fs+'px';
  document.getElementById('btn-up').disabled  =noteIdx===NOTE_SIZES.length-1;
  document.getElementById('btn-down').disabled=noteIdx===0;
}
document.getElementById('btn-up').addEventListener('click',()=>{if(noteIdx<NOTE_SIZES.length-1){noteIdx++;applyNoteFont();}});
document.getElementById('btn-down').addEventListener('click',()=>{if(noteIdx>0){noteIdx--;applyNoteFont();}});
applyNoteFont();

/* ══════════════════════════════════
   REMINDER FONT SIZE
══════════════════════════════════ */
const REM_SIZES=[18,22,26,30,36,44,54];
let remIdx=3; // default 30px — large enough for elderly

function applyRemFont(){
  const fs=REM_SIZES[remIdx];
  document.getElementById('rem-font-val').textContent=fs;
  // Apply to all dynamic card elements via CSS variable
  document.documentElement.style.setProperty('--rem-fs',fs+'px');
  document.documentElement.style.setProperty('--rem-meta-fs',Math.max(14,Math.round(fs*.75))+'px');
  document.documentElement.style.setProperty('--rem-icon',Math.max(40,Math.round(fs*1.4))+'px');
  document.getElementById('rem-dn').disabled=remIdx===0;
  document.getElementById('rem-up').disabled=remIdx===REM_SIZES.length-1;
  // Re-render to pick up new size
  renderReminders();
}
document.getElementById('rem-up').addEventListener('click',()=>{if(remIdx<REM_SIZES.length-1){remIdx++;applyRemFont();}});
document.getElementById('rem-dn').addEventListener('click',()=>{if(remIdx>0){remIdx--;applyRemFont();}});

/* ══════════════════════════════════
   REMINDERS — localStorage
══════════════════════════════════ */
const LS_KEY='hk_reminders_v1';
let reminders=[];

function loadReminders(){
  try{reminders=JSON.parse(localStorage.getItem(LS_KEY))||[];}catch(e){reminders=[];}
}
function saveReminders(){localStorage.setItem(LS_KEY,JSON.stringify(reminders));}

const REPEAT_LABEL={none:'',daily:'每日',weekly:'每週',monthly:'每月'};

function sortedReminders(){
  return [...reminders].sort((a,b)=>{
    if(a.pinned!==b.pinned) return a.pinned?-1:1;
    const da=(a.date||'9999')+(a.time||'99:99');
    const db=(b.date||'9999')+(b.time||'99:99');
    return da<db?1:-1;
  });
}

function fmtDate(s){
  if(!s)return '';
  const[y,m,d]=s.split('-');
  return `${y}年${Number(m)}月${Number(d)}日`;
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderReminders(){
  const fs     = REM_SIZES[remIdx];
  const metaFs = Math.max(14,Math.round(fs*.78));
  const iconSz = Math.max(44,Math.round(fs*1.5));
  const list   = document.getElementById('reminders-list');
  const sorted = sortedReminders();

  if(!sorted.length){
    list.innerHTML=`<div class="empty-state">尚未有提醒事項<br>按「＋ 新增」加入</div>`;
    return;
  }

  list.innerHTML=sorted.map(r=>{
    const repLabel=r.repeat&&r.repeat!=='none'
      ?`<span class="badge badge-repeat">${REPEAT_LABEL[r.repeat]||r.repeat}</span>`:'';
    return `
    <div class="reminder-card ${r.pinned?'pinned':''}" data-id="${r.id}">
      <div class="pin-col">
        <button class="icon-btn ${r.pinned?'pin-on':''}"
          style="width:${iconSz}px;height:${iconSz}px;font-size:${Math.round(iconSz*.5)}px"
          onclick="togglePin('${r.id}')" title="置頂">📌</button>
        <button class="icon-btn edit-btn"
          style="width:${iconSz}px;height:${iconSz}px;font-size:${Math.round(iconSz*.5)}px"
          onclick="openEdit('${r.id}')" title="編輯">✏️</button>
        <button class="icon-btn del-btn"
          style="width:${iconSz}px;height:${iconSz}px;font-size:${Math.round(iconSz*.5)}px"
          onclick="deleteReminder('${r.id}')" title="刪除">🗑️</button>
      </div>
      <div class="card-body">
        <div class="card-meta" style="font-size:${metaFs}px">
          ${r.date    ?`<span class="meta-pill">📅 ${fmtDate(r.date)}</span>`:''}
          ${r.time    ?`<span class="meta-pill">⏰ ${r.time}</span>`:''}
          ${r.location?`<span class="meta-pill">📍 ${escHtml(r.location)}</span>`:''}
          ${repLabel}
          <span class="badge badge-pin">置頂</span>
        </div>
        <div class="card-content" style="font-size:${fs}px">${escHtml(r.content||'（無內容）')}</div>
      </div>
    </div>`;
  }).join('');
}

function togglePin(id){
  const r=reminders.find(x=>x.id===id);
  if(r){r.pinned=!r.pinned;saveReminders();renderReminders();}
}
function deleteReminder(id){
  if(!confirm('確定刪除此提醒？'))return;
  reminders=reminders.filter(x=>x.id!==id);
  saveReminders();renderReminders();
}

/* ── Modal ── */
const backdrop  =document.getElementById('modal-backdrop');
const modalTitle=document.getElementById('modal-title');
let editingId=null, selRepeat='none';

function todayHK(){
  const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Hong_Kong'}));
  return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
}

function openModal(title,data={}){
  modalTitle.textContent=title;
  document.getElementById('f-date').value   =data.date    ||todayHK();
  document.getElementById('f-time').value   =data.time    ||'';
  document.getElementById('f-loc').value    =data.location||'';
  document.getElementById('f-content').value=data.content ||'';
  selRepeat=data.repeat||'none';
  updateRepeatUI();
  backdrop.classList.remove('hidden');
  setTimeout(()=>document.getElementById('f-content').focus(),100);
}
function closeModal(){backdrop.classList.add('hidden');editingId=null;}
function updateRepeatUI(){
  document.querySelectorAll('.repeat-opt').forEach(b=>b.classList.toggle('sel',b.dataset.val===selRepeat));
}
document.querySelectorAll('.repeat-opt').forEach(b=>{
  b.addEventListener('click',()=>{selRepeat=b.dataset.val;updateRepeatUI();});
});

document.getElementById('add-reminder-btn').addEventListener('click',()=>{editingId=null;openModal('新增提醒');});
document.getElementById('modal-close').addEventListener('click',closeModal);
document.getElementById('modal-cancel').addEventListener('click',closeModal);
backdrop.addEventListener('click',e=>{if(e.target===backdrop)closeModal();});

document.getElementById('modal-save').addEventListener('click',()=>{
  const content=document.getElementById('f-content').value.trim();
  if(!content){alert('請填寫內容');return;}
  const data={
    date:document.getElementById('f-date').value,
    time:document.getElementById('f-time').value,
    location:document.getElementById('f-loc').value.trim(),
    content, repeat:selRepeat,
  };
  if(editingId){
    const r=reminders.find(x=>x.id===editingId);
    if(r)Object.assign(r,data);
  } else {
    reminders.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2),pinned:false,...data});
  }
  saveReminders();renderReminders();closeModal();
});

function openEdit(id){
  const r=reminders.find(x=>x.id===id);
  if(!r)return;
  editingId=id;
  openModal('編輯提醒',r);
}

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
function init(){
  // Clock block = full viewport
  document.getElementById('clock-block').style.height=window.innerHeight+'px';
  applySplit(50);
  calcFontSizes();
  applyNoteFont();
  loadReminders();
  applyRemFont(); // renders reminders with correct size
}

window.addEventListener('resize',()=>{
  document.getElementById('clock-block').style.height=window.innerHeight+'px';
  calcFontSizes();
});

window.addEventListener('load',init);
setTimeout(init,120);
</script>
